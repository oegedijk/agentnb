name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --frozen
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run ty check src/ tests/
      - run: uv run python -m pytest

  publish:
    needs: release-gate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          uv run --with packaging python - <<'PY' "$TAG_VERSION"
          import sys
          import tomllib
          from pathlib import Path
          from packaging.version import Version

          tag_version = Version(sys.argv[1])
          project_version = Version(
              tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          )

          if tag_version != project_version:
              print(
                  f"Tag version ({tag_version}) does not match pyproject version ({project_version})."
              )
              raise SystemExit(1)
          PY
      - run: uv build
      - run: uvx twine check dist/*.tar.gz dist/*.whl
      - uses: pypa/gh-action-pypi-publish@release/v1
